<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Neon Air Painter</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; }
        body {
            background-color: #020202;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: white;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        .ui-layer {
            position: absolute;
            z-index: 100;
            pointer-events: none;
            width: 100%;
            height: 100%;
        }
        .interactive { pointer-events: auto; }
        .glass {
            background: rgba(10, 10, 10, 0.75);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #video-preview {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 220px;
            height: 165px;
            border-radius: 20px;
            transform: scaleX(-1);
            object-fit: cover;
            border: 2px solid rgba(255,255,255,0.1);
            z-index: 10;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 15px var(--neon);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Rendering Layers -->
    <canvas id="paint-layer"></canvas>
    <canvas id="fx-layer"></canvas>

    <div class="ui-layer p-8 flex flex-col justify-between">
        <!-- Control Panel -->
        <div class="flex justify-between items-start">
            <div class="glass p-6 rounded-3xl w-80 interactive">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse shadow-[0_0_10px_#22d3ee]"></div>
                    <h1 class="orbitron text-lg font-bold tracking-widest text-white">NEON ENGINE</h1>
                </div>

                <div class="space-y-6">
                    <div>
                        <div class="flex justify-between text-[10px] orbitron mb-2 tracking-widest text-gray-400">
                            <span>COLOR FREQUENCY</span>
                            <span id="hex-label" style="color: var(--neon)">#00F2FF</span>
                        </div>
                        <input type="color" id="color-picker" value="#00f2ff" class="w-full h-10 rounded-xl bg-transparent border-none cursor-pointer">
                    </div>

                    <div>
                        <div class="flex justify-between text-[10px] orbitron mb-2 tracking-widest text-gray-400">
                            <span>BEAM INTENSITY</span>
                            <span id="size-label">15PX</span>
                        </div>
                        <input type="range" id="size-slider" min="5" max="80" value="15">
                    </div>

                    <button id="clear-btn" class="w-full py-4 glass hover:bg-white/10 rounded-2xl text-[10px] orbitron font-bold tracking-[0.3em] text-white transition-all active:scale-95 uppercase">
                        Clear Workspace
                    </button>
                </div>
            </div>

            <!-- Awesome Status Display -->
            <div id="status-display" class="glass px-6 py-4 rounded-full flex items-center gap-4 transition-all duration-300">
                <div id="status-indicator" class="w-4 h-4 rounded-full bg-gray-500 shadow-lg"></div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400 font-bold tracking-tighter uppercase">System Status</span>
                    <span id="status-mode" class="orbitron text-xs font-bold tracking-widest">INITIALIZING</span>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div class="glass p-5 rounded-3xl w-fit flex gap-8 text-gray-400">
            <div class="flex items-center gap-3">
                <span class="text-xl">☝️</span>
                <span class="text-[10px] orbitron font-medium tracking-widest">POINT = <span class="text-white">DRAW</span></span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xl">🖐️</span>
                <span class="text-[10px] orbitron font-medium tracking-widest">PALM = <span class="text-white">ERASE</span></span>
            </div>
            <div class="flex items-center gap-3">
                <span class="text-xl">✊</span>
                <span class="text-[10px] orbitron font-medium tracking-widest">FIST = <span class="text-white">PAUSE</span></span>
            </div>
        </div>
    </div>

    <video id="video-preview" autoplay playsinline></video>

    <script>
        const pCanvas = document.getElementById('paint-layer');
        const fCanvas = document.getElementById('fx-layer');
        const pCtx = pCanvas.getContext('2d');
        const fCtx = fCanvas.getContext('2d');
        const video = document.getElementById('video-preview');
        
        // UI Refs
        const colorPicker = document.getElementById('color-picker');
        const sizeSlider = document.getElementById('size-slider');
        const statusMode = document.getElementById('status-mode');
        const statusIndicator = document.getElementById('status-indicator');
        const clearBtn = document.getElementById('clear-btn');

        let brushColor = '#00f2ff';
        let brushSize = 15;
        let particles = [];
        
        // Motion Core
        let targetX = 0, targetY = 0;
        let curX = window.innerWidth / 2;
        let curY = window.innerHeight / 2;
        let lastX = 0, lastY = 0;
        let isDrawing = false;
        let currentMode = 'IDLE';

        function resize() {
            pCanvas.width = fCanvas.width = window.innerWidth;
            pCanvas.height = fCanvas.height = window.innerHeight;
            pCtx.lineCap = pCtx.lineJoin = 'round';
        }

        window.addEventListener('resize', resize);
        resize();

        // Particle Class
        class Sparkle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 12;
                this.vy = (Math.random() - 0.5) * 12;
                this.life = 1.0;
                this.color = color;
                this.size = Math.random() * 4 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.025;
                this.size *= 0.95;
            }
            draw(ctx) {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Status Logic
        function setStatus(mode) {
            if (currentMode === mode) return;
            currentMode = mode;
            statusMode.innerText = mode;
            
            const colors = {
                'DRAWING': { bg: '#22d3ee', shadow: '#22d3ee' },
                'ERASING': { bg: '#ef4444', shadow: '#ef4444' },
                'STASIS': { bg: '#94a3b8', shadow: '#000000' },
                'IDLE': { bg: '#ffffff', shadow: '#ffffff' },
                'NO SIGNAL': { bg: '#334155', shadow: '#000000' }
            };
            
            const cfg = colors[mode] || colors['IDLE'];
            statusIndicator.style.backgroundColor = cfg.bg;
            statusIndicator.style.boxShadow = `0 0 15px ${cfg.shadow}`;
        }

        // Initialize MediaPipe
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const index = hand[8];
                const middle = hand[12];
                const ring = hand[16];
                const pinky = hand[20];

                // COORDINATE MAPPING (Wider sensitivity for full screen reach)
                // We use a centered focus area (0.2 to 0.8) and expand it to 0-1
                let rawX = (index.x - 0.2) / 0.6;
                let rawY = (index.y - 0.2) / 0.6;
                
                targetX = (1 - Math.max(0, Math.min(1, rawX))) * window.innerWidth;
                targetY = Math.max(0, Math.min(1, rawY)) * window.innerHeight;

                // Smooth Interpolation
                curX += (targetX - curX) * 0.45;
                curY += (targetY - curY) * 0.45;

                // Hand Logic
                const indexUp = index.y < hand[6].y;
                const middleUp = middle.y < hand[10].y;
                const ringUp = ring.y < hand[14].y;
                
                if (indexUp && middleUp && ringUp) {
                    setStatus('ERASING');
                    erase(curX, curY);
                    isDrawing = false;
                } else if (!indexUp && !middleUp && !ringUp) {
                    setStatus('STASIS');
                    isDrawing = false;
                } else if (indexUp && !middleUp) {
                    setStatus('DRAWING');
                    draw(curX, curY);
                    isDrawing = true;
                } else {
                    setStatus('IDLE');
                    isDrawing = false;
                }
            } else {
                setStatus('NO SIGNAL');
                isDrawing = false;
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();

        function draw(x, y) {
            if (!isDrawing) {
                lastX = x;
                lastY = y;
                return;
            }

            pCtx.save();
            // Glow effect
            pCtx.shadowBlur = brushSize * 1.5;
            pCtx.shadowColor = brushColor;
            pCtx.strokeStyle = brushColor;
            pCtx.lineWidth = brushSize;
            pCtx.globalAlpha = 0.5;
            pCtx.beginPath();
            pCtx.moveTo(lastX, lastY);
            pCtx.lineTo(x, y);
            pCtx.stroke();

            // Core center
            pCtx.shadowBlur = 0;
            pCtx.strokeStyle = 'white';
            pCtx.lineWidth = brushSize * 0.3;
            pCtx.globalAlpha = 1.0;
            pCtx.stroke();
            pCtx.restore();

            // Create Sparkles
            for (let i = 0; i < 5; i++) {
                particles.push(new Sparkle(x, y, brushColor));
            }

            lastX = x;
            lastY = y;
        }

        function erase(x, y) {
            pCtx.save();
            pCtx.globalCompositeOperation = 'destination-out';
            pCtx.beginPath();
            pCtx.arc(x, y, brushSize * 4, 0, Math.PI * 2);
            pCtx.fill();
            pCtx.restore();
            
            // Add "dust" particles when erasing
            if (Math.random() > 0.5) particles.push(new Sparkle(x, y, '#ff0000'));
        }

        function animate() {
            fCtx.clearRect(0, 0, fCanvas.width, fCanvas.height);
            
            // Draw Interactive Cursor
            if (currentMode !== 'NO SIGNAL') {
                const color = currentMode === 'ERASING' ? '#ff4444' : (currentMode === 'DRAWING' ? brushColor : '#ffffff');
                
                fCtx.save();
                fCtx.translate(curX, curY);
                
                // Pulsing Ring
                const pulse = Math.sin(Date.now() / 200) * 5;
                fCtx.strokeStyle = color;
                fCtx.lineWidth = 2;
                fCtx.beginPath();
                fCtx.arc(0, 0, brushSize + 15 + pulse, 0, Math.PI * 2);
                fCtx.stroke();
                
                // Crosshair
                fCtx.beginPath();
                fCtx.moveTo(-20, 0); fCtx.lineTo(20, 0);
                fCtx.moveTo(0, -20); fCtx.lineTo(0, 20);
                fCtx.stroke();
                
                // Mode Text
                fCtx.fillStyle = color;
                fCtx.font = 'bold 10px Orbitron';
                fCtx.textAlign = 'center';
                fCtx.fillText(currentMode, 0, brushSize + 35);
                
                fCtx.restore();
            }

            // Render Particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw(fCtx);
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }

        // Listeners
        colorPicker.addEventListener('input', (e) => {
            brushColor = e.target.value;
            document.documentElement.style.setProperty('--neon', brushColor);
            document.getElementById('hex-label').innerText = brushColor.toUpperCase();
        });
        sizeSlider.addEventListener('input', (e) => {
            brushSize = parseInt(e.target.value);
            document.getElementById('size-label').innerText = brushSize + 'PX';
        });
        clearBtn.addEventListener('click', () => {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
        });

        animate();
    </script>
</body>
</html>
