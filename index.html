<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Air Painter</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-color: #00f2ff;
        }
        body {
            background-color: #050505;
            color: #e0e0e0;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .glass {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        #video-preview {
            position: absolute;
            bottom: 24px;
            right: 24px;
            width: 200px;
            height: 150px;
            border-radius: 16px;
            transform: scaleX(-1);
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 50;
        }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        
        /* Custom range styling */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            height: 4px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-color);
        }
    </style>
</head>
<body>

    <div id="app" class="relative w-screen h-screen">
        <!-- Layered Canvases -->
        <canvas id="bg-canvas"></canvas> <!-- Background/Static -->
        <canvas id="paint-canvas"></canvas> <!-- Persistent lines -->
        <canvas id="particle-canvas"></canvas> <!-- Sparkles and real-time effects -->

        <!-- Top UI -->
        <div class="absolute top-8 left-8 z-50 flex flex-col gap-6">
            <div class="glass p-6 rounded-2xl w-72">
                <h1 class="orbitron text-xl font-bold tracking-widest text-white mb-1">NEON AR</h1>
                <p class="text-[10px] text-gray-400 uppercase tracking-tighter mb-6">Gesture Motion Engine v2.0</p>
                
                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-xs font-medium text-gray-300">Core Frequency</label>
                            <span id="color-hex" class="text-[10px] orbitron" style="color: var(--neon-color);">#00F2FF</span>
                        </div>
                        <input type="color" id="color-picker" value="#00f2ff" class="w-full h-8 rounded bg-transparent border-none cursor-pointer">
                    </div>

                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-xs font-medium text-gray-300">Beam Width</label>
                            <span id="thick-val" class="text-[10px] orbitron">12px</span>
                        </div>
                        <input type="range" id="thick-slider" min="4" max="60" value="12" class="w-full">
                    </div>

                    <button id="clear-btn" class="w-full py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl text-xs font-bold transition-all active:scale-95 uppercase tracking-widest">
                        Purge Memory
                    </button>
                </div>
            </div>

            <!-- Gesture Legend -->
            <div class="glass p-4 rounded-2xl text-[10px] flex flex-col gap-3 text-gray-400">
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-lg bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold">☝️</span>
                    <span>INDEX UP: <b class="text-white">IGNITE BEAM</b></span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-lg bg-red-500/20 flex items-center justify-center text-red-400 font-bold">🖐️</span>
                    <span>OPEN PALM: <b class="text-white">DISSOLVE (ERASE)</b></span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="w-8 h-8 rounded-lg bg-gray-500/20 flex items-center justify-center text-gray-400 font-bold">✊</span>
                    <span>FIST: <b class="text-white">STASIS (PAUSE)</b></span>
                </div>
            </div>
        </div>

        <!-- Mode Indicator -->
        <div class="absolute bottom-8 left-8 z-50">
            <div id="status-pill" class="glass px-4 py-2 rounded-full border border-white/20 flex items-center gap-3">
                <div id="status-dot" class="w-2 h-2 rounded-full bg-gray-500 animate-pulse"></div>
                <span id="status-text" class="orbitron text-[10px] uppercase tracking-widest">Awaiting Input...</span>
            </div>
        </div>

        <video id="video-preview" autoplay playsinline></video>
    </div>

    <script>
        const paintCanvas = document.getElementById('paint-canvas');
        const partCanvas = document.getElementById('particle-canvas');
        const pCtx = paintCanvas.getContext('2d');
        const mCtx = partCanvas.getContext('2d');
        const video = document.getElementById('video-preview');
        
        const colorPicker = document.getElementById('color-picker');
        const thickSlider = document.getElementById('thick-slider');
        const thickVal = document.getElementById('thick-val');
        const clearBtn = document.getElementById('clear-btn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        let brushColor = '#00f2ff';
        let brushSize = 12;
        let particles = [];
        
        // Smoothing Variables (Lerp)
        let targetX = 0, targetY = 0;
        let currentX = 0, currentY = 0;
        let lastX = 0, lastY = 0;
        let isActive = false;
        let currentMode = 'IDLE';

        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            colorPicker.addEventListener('input', (e) => {
                brushColor = e.target.value;
                document.documentElement.style.setProperty('--neon-color', brushColor);
                document.getElementById('color-hex').innerText = brushColor.toUpperCase();
            });
            
            thickSlider.addEventListener('input', (e) => {
                brushSize = parseInt(e.target.value);
                thickVal.innerText = brushSize + 'px';
            });

            clearBtn.addEventListener('click', () => {
                pCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                particles = [];
            });

            animate();
        }

        function resize() {
            paintCanvas.width = window.innerWidth;
            paintCanvas.height = window.innerHeight;
            partCanvas.width = window.innerWidth;
            partCanvas.height = window.innerHeight;
            pCtx.lineCap = 'round';
            pCtx.lineJoin = 'round';
        }

        // Particle Class for the "Sparkle"
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 6;
                this.speedY = (Math.random() - 0.5) * 6;
                this.color = color;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.015;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;
                if (this.size > 0.1) this.size -= 0.05;
            }
            draw() {
                mCtx.fillStyle = this.color;
                mCtx.globalAlpha = this.life;
                mCtx.beginPath();
                mCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                mCtx.fill();
            }
        }

        function updateStatus(mode) {
            currentMode = mode;
            statusText.innerText = mode;
            if (mode === 'DRAWING') {
                statusDot.className = 'w-2 h-2 rounded-full bg-cyan-400 shadow-[0_0_8px_#22d3ee]';
            } else if (mode === 'ERASING') {
                statusDot.className = 'w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_#ef4444]';
            } else {
                statusDot.className = 'w-2 h-2 rounded-full bg-gray-500';
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.8,
            minTrackingConfidence: 0.8
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const hand = results.multiHandLandmarks[0];
                const index = hand[8];
                const middle = hand[12];
                const ring = hand[16];
                const pinky = hand[20];
                const wrist = hand[0];

                targetX = (1 - index.x) * window.innerWidth;
                targetY = index.y * window.innerHeight;

                // Smoothing (Lerp)
                currentX += (targetX - currentX) * 0.35;
                currentY += (targetY - currentY) * 0.35;

                // Gesture Logic
                const isIndexUp = index.y < hand[6].y;
                const isMiddleDown = middle.y > hand[10].y;
                const isPalmOpen = index.y < hand[6].y && middle.y < hand[10].y && ring.y < hand[14].y;
                const isFist = index.y > hand[6].y && middle.y > hand[10].y && ring.y > hand[14].y;

                if (isPalmOpen) {
                    updateStatus('ERASING');
                    performErase(currentX, currentY);
                    isActive = false;
                } else if (isFist) {
                    updateStatus('STASIS');
                    isActive = false;
                } else if (isIndexUp && isMiddleDown) {
                    updateStatus('DRAWING');
                    performDraw(currentX, currentY);
                    isActive = true;
                } else {
                    updateStatus('IDLE');
                    isActive = false;
                }
            } else {
                updateStatus('NO SIGNAL');
                isActive = false;
            }
        });

        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();

        function performDraw(x, y) {
            if (!isActive) {
                lastX = x;
                lastY = y;
                return;
            }

            // Draw to the persistent canvas
            pCtx.save();
            
            // Multiple passes for high-end glow
            // Pass 1: Wide Soft Glow
            pCtx.shadowBlur = brushSize * 2;
            pCtx.shadowColor = brushColor;
            pCtx.strokeStyle = brushColor;
            pCtx.lineWidth = brushSize;
            pCtx.globalAlpha = 0.3;
            pCtx.beginPath();
            pCtx.moveTo(lastX, lastY);
            pCtx.lineTo(x, y);
            pCtx.stroke();

            // Pass 2: Bright Core
            pCtx.shadowBlur = 0;
            pCtx.strokeStyle = '#ffffff';
            pCtx.lineWidth = brushSize * 0.3;
            pCtx.globalAlpha = 0.8;
            pCtx.beginPath();
            pCtx.moveTo(lastX, lastY);
            pCtx.lineTo(x, y);
            pCtx.stroke();
            
            pCtx.restore();

            // Spawn sparkles
            for (let i = 0; i < 3; i++) {
                particles.push(new Particle(x, y, brushColor));
            }

            lastX = x;
            lastY = y;
        }

        function performErase(x, y) {
            pCtx.save();
            pCtx.globalCompositeOperation = 'destination-out';
            pCtx.beginPath();
            pCtx.arc(x, y, brushSize * 4, 0, Math.PI * 2);
            pCtx.fill();
            pCtx.restore();
            
            // Red sparks for erasing
            particles.push(new Particle(x, y, '#ff4444'));
        }

        function animate() {
            mCtx.clearRect(0, 0, partCanvas.width, partCanvas.height);
            
            // Draw Cursor/Aura on particle canvas
            if (currentMode !== 'NO SIGNAL') {
                mCtx.save();
                mCtx.shadowBlur = 20;
                mCtx.shadowColor = currentMode === 'ERASING' ? '#ff0000' : brushColor;
                mCtx.fillStyle = 'rgba(255,255,255,0.2)';
                mCtx.beginPath();
                mCtx.arc(currentX, currentY, brushSize, 0, Math.PI * 2);
                mCtx.fill();
                mCtx.restore();
            }

            // Update/Draw Particles
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }

        init();
    </script>
</body>
</html>
