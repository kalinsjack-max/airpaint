<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HandConnect — Gesture Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    font-family: 'Space Mono', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #container {
    position: relative;
    width: 100vw;
    height: 100vh;
  }

  #video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);
    opacity: 0;
    transition: opacity 0.8s ease;
  }

  #video.active { opacity: 1; }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform: scaleX(-1);
  }

  #hud {
    position: absolute;
    top: 20px; left: 20px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
  }

  .hud-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .hud-label {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    min-width: 90px;
  }

  .hud-value {
    font-size: 12px;
    font-weight: 700;
    color: #00ffb3;
    letter-spacing: 0.05em;
    transition: color 0.2s;
  }

  .hud-value.warn { color: #ff4fa3; }
  .hud-value.info { color: #a78bff; }

  #title-overlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    transition: opacity 0.8s ease;
  }

  #title-overlay h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(0,255,179,0.3);
  }

  #title-overlay p {
    margin-top: 1rem;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  #start-btn {
    margin-top: 2rem;
    padding: 12px 32px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: #fff;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.1em;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  #start-btn:hover {
    background: rgba(255,255,255,0.08);
    border-color: rgba(0,255,179,0.6);
    color: #00ffb3;
  }

  #loading {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 25;
    display: none;
  }

  #loading p {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  #corner-br {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 10;
  }
</style>
</head>
<body>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div class="hud-row">
      <span class="hud-label">Hands</span>
      <span class="hud-value" id="hud-hands">0</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">FPS</span>
      <span class="hud-value" id="hud-fps">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Gesture</span>
      <span class="hud-value info" id="hud-gesture">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Spread</span>
      <span class="hud-value warn" id="hud-spread">—</span>
    </div>
  </div>

  <div id="title-overlay">
    <h1>Hand<br>Connect</h1>
    <p>Gesture Visualizer</p>
    <button id="start-btn" onclick="startCamera()">Enable Camera</button>
  </div>

  <div id="loading">
    <p>Loading model…</p>
  </div>

  <div id="corner-br">HandConnect v2</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [9,10],[10,11],[11,12],
  [13,14],[14,15],[15,16],
  [0,17],[17,18],[18,19],[19,20],
  [5,9],[9,13],[13,17]
];

const FINGER_COLORS = [
  '#ff4fa3','#ff9f4a','#ffe94a','#4aff9f','#4ab0ff'
];

let lastTime = 0;
let fps = 0;
let frameCount = 0;
let fpsTimer = 0;
let currentHands = [];
let hue = 0;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function detectGesture(lm) {
  const tips = [4, 8, 12, 16, 20];
  const mcp  = [2, 5, 9, 13, 17];
  let extended = 0;
  for (let i = 1; i < 5; i++) {
    if (lm[tips[i]].y < lm[mcp[i]].y) extended++;
  }
  const thumbOpen = Math.abs(lm[4].x - lm[0].x) > 0.08;
  const d48 = Math.hypot(lm[4].x - lm[8].x, lm[4].y - lm[8].y);
  if (d48 < 0.06) return 'PINCH';
  if (extended === 0) return 'FIST';
  if (extended === 4 && thumbOpen) return 'OPEN';
  if (extended === 1 && lm[tips[1]].y < lm[mcp[1]].y) return 'POINT';
  if (extended === 2) return 'PEACE';
  if (extended === 4) return 'FOUR';
  return 'HAND';
}

function getSpread(h1, h2) {
  const cx1 = h1.reduce((s,p) => s + p.x, 0) / h1.length;
  const cy1 = h1.reduce((s,p) => s + p.y, 0) / h1.length;
  const cx2 = h2.reduce((s,p) => s + p.x, 0) / h2.length;
  const cy2 = h2.reduce((s,p) => s + p.y, 0) / h2.length;
  return Math.round(Math.hypot(cx2 - cx1, cy2 - cy1) * 100);
}

function lp(lm, idx) {
  return {
    x: lm[idx].x * canvas.width,
    y: lm[idx].y * canvas.height
  };
}

function drawHand(lm, colorShift) {
  CONNECTIONS.forEach(([a, b], i) => {
    const pa = lp(lm, a);
    const pb = lp(lm, b);
    const fingerIdx = Math.min(Math.floor(i / 4), 4);
    const baseHue = (hue + colorShift + fingerIdx * 36) % 360;

    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = `hsla(${baseHue}, 100%, 65%, 0.9)`;
    ctx.lineWidth = 2.5;
    ctx.shadowBlur = 12;
    ctx.shadowColor = `hsla(${baseHue}, 100%, 65%, 0.6)`;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  lm.forEach((pt, i) => {
    const p = lp(lm, i);
    const baseHue = (hue + colorShift + Math.floor(i / 4) * 36) % 360;
    const isJoint = [4,8,12,16,20].includes(i);

    ctx.beginPath();
    ctx.arc(p.x, p.y, isJoint ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${baseHue}, 100%, 80%, 1)`;
    ctx.shadowBlur = 16;
    ctx.shadowColor = `hsla(${baseHue}, 100%, 65%, 0.8)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

function drawConnectingBeams(h1, h2) {
  const tips = [4, 8, 12, 16, 20];
  tips.forEach((tipIdx, i) => {
    const pa = lp(h1, tipIdx);
    const pb = lp(h2, tipIdx);
    const beamHue = (hue + i * 60) % 360;

    const grad = ctx.createLinearGradient(pa.x, pa.y, pb.x, pb.y);
    grad.addColorStop(0, `hsla(${beamHue}, 100%, 65%, 0.85)`);
    grad.addColorStop(0.5, `hsla(${(beamHue + 30) % 360}, 100%, 80%, 0.95)`);
    grad.addColorStop(1, `hsla(${(beamHue + 60) % 360}, 100%, 65%, 0.85)`);

    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 20;
    ctx.shadowColor = `hsla(${beamHue}, 100%, 65%, 0.5)`;
    ctx.stroke();
    ctx.shadowBlur = 0;
  });

  const wrist1 = lp(h1, 0);
  const wrist2 = lp(h2, 0);
  const wristHue = (hue + 180) % 360;
  const grad2 = ctx.createLinearGradient(wrist1.x, wrist1.y, wrist2.x, wrist2.y);
  grad2.addColorStop(0, `hsla(${wristHue}, 100%, 60%, 0.6)`);
  grad2.addColorStop(1, `hsla(${(wristHue + 120) % 360}, 100%, 60%, 0.6)`);
  ctx.beginPath();
  ctx.moveTo(wrist1.x, wrist1.y);
  ctx.lineTo(wrist2.x, wrist2.y);
  ctx.strokeStyle = grad2;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 6]);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawFrame(results) {
  const now = performance.now();
  frameCount++;
  if (now - fpsTimer >= 1000) {
    fps = frameCount;
    frameCount = 0;
    fpsTimer = now;
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hue = (hue + 0.5) % 360;

  const hands = results.multiHandLandmarks || [];
  currentHands = hands;

  document.getElementById('hud-hands').textContent = hands.length;
  document.getElementById('hud-fps').textContent = fps;

  if (hands.length === 0) {
    document.getElementById('hud-gesture').textContent = '—';
    document.getElementById('hud-spread').textContent = '—';
  }

  hands.forEach((lm, i) => {
    drawHand(lm, i * 120);
    const gesture = detectGesture(lm);
    document.getElementById('hud-gesture').textContent = gesture;
  });

  if (hands.length === 2) {
    drawConnectingBeams(hands[0], hands[1]);
    const spread = getSpread(hands[0], hands[1]);
    document.getElementById('hud-spread').textContent = spread + '%';
  } else {
    document.getElementById('hud-spread').textContent = '—';
  }
}

async function startCamera() {
  const titleOverlay = document.getElementById('title-overlay');
  const loadingDiv = document.getElementById('loading');

  titleOverlay.style.opacity = '0';
  setTimeout(() => { titleOverlay.style.display = 'none'; }, 800);
  loadingDiv.style.display = 'block';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' }
    });
    video.srcObject = stream;
    video.classList.add('active');

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.6
    });

    hands.onResults((results) => {
      loadingDiv.style.display = 'none';
      drawFrame(results);
    });

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 1280,
      height: 720
    });
    camera.start();

  } catch (err) {
    loadingDiv.innerHTML = `<p style="color:#ff4fa3">Camera access denied.<br>Please allow camera permissions.</p>`;
    console.error(err);
  }
}
</script>
</body>
</html>
